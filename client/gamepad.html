<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#07070f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>VirtualGamepad — Controller</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/gamepad.css">
</head>
<body>

  <!-- ── Rotate prompt (shown in portrait mode) ──────────────────────────── -->
  <div id="rotate-prompt">
    <div class="rotate-icon">📱</div>
    <h2>Telefonu yatay çevirin</h2>
    <p>Kontrolör yatay modda çalışır</p>
  </div>

  <!-- ── Status bar ──────────────────────────────────────────────────────── -->
  <div id="status-bar">
    <div class="dot yellow" id="status-dot"></div>
    <span id="status-text">Bağlanıyor…</span>
    <span id="latency" class="latency"></span>
    <span id="player-badge" class="player-badge" style="display:none">P?</span>
    <button id="fullscreen-btn" title="Tam Ekran" aria-label="Tam ekran aç/kapat">⛶</button>
  </div>

  <style>
    #fullscreen-btn {
      margin-left: auto;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.18);
      color: #fff;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 1rem;
      line-height: 1.4;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .15s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    #fullscreen-btn:active { background: rgba(255,255,255,.25); }
  </style>

  <!-- ══════════════════════════════════════════════════════════════════════
       XBOX LAYOUT  (default)
  ══════════════════════════════════════════════════════════════════════════ -->
  <div id="gamepad-root" class="layout-xbox">

    <!-- Top bar: LT | LB | [VIEW·GUIDE·MENU] | RB | RT -->
    <div class="top-bar">

      <div class="trigger-zone" id="lt-zone" title="LT">
        <div class="trigger-fill" id="lt-fill"></div>
        <span class="trigger-label">LT</span>
      </div>

      <button class="bumper-btn" id="lb-btn">LB</button>

      <div class="sys-buttons">
        <button class="sys-btn" id="view-btn" title="View / Select">⧉</button>
        <button class="sys-btn guide-btn" id="guide-btn" title="Guide">⬡</button>
        <button class="sys-btn" id="menu-btn" title="Menu / Start">≡</button>
      </div>

      <button class="bumper-btn" id="rb-btn">RB</button>

      <div class="trigger-zone" id="rt-zone" title="RT">
        <div class="trigger-fill" id="rt-fill"></div>
        <span class="trigger-label">RT</span>
      </div>

    </div>

    <!-- Left area: DPad (top) + Left Stick (bottom) -->
    <div class="left-area">
      <div class="dpad" id="dpad">
        <button class="dpad-btn dpad-up"    id="dpad-up">▲</button>
        <button class="dpad-btn dpad-left"  id="dpad-left">◄</button>
        <div    class="dpad-center"></div>
        <button class="dpad-btn dpad-right" id="dpad-right">►</button>
        <button class="dpad-btn dpad-down"  id="dpad-down">▼</button>
      </div>

      <div class="joystick-zone" id="left-stick">
        <div class="joystick-thumb" id="left-thumb"></div>
      </div>
    </div>

    <!-- Center spacer (holds nothing) -->
    <div class="center-area"></div>

    <!-- Right area: ABXY (top) + Right Stick (bottom) -->
    <div class="right-area">
      <div class="abxy" id="abxy">
        <button class="face-btn btn-y" id="btn-y">Y</button>
        <button class="face-btn btn-x" id="btn-x">X</button>
        <button class="face-btn btn-b" id="btn-b">B</button>
        <button class="face-btn btn-a" id="btn-a">A</button>
      </div>

      <div class="joystick-zone" id="right-stick">
        <div class="joystick-thumb" id="right-thumb"></div>
      </div>
    </div>

  </div><!-- /#gamepad-root -->

  <!-- ── Layout switcher (floating bottom) ────────────────────────────── -->
  <div id="layout-switcher">
    <button class="layout-tab active" data-layout="xbox">🎮 Xbox</button>
    <button class="layout-tab"        data-layout="racing">🏎️ Yarış</button>
  </div>


  <!-- ══════════════════════════════════════════════════════════════════════
       RACING OVERLAY  (hidden until layout-racing)
  ══════════════════════════════════════════════════════════════════════════ -->
  <div id="racing-overlay" style="display:none; position:fixed; inset:36px 0 0; z-index:50; pointer-events:none;">
    <div class="racing-root" style="pointer-events:none;">
      <div>
        <div class="steering-indicator" id="steering-indicator">
          <div class="steering-center-mark"></div>
          <div class="steering-bar" id="steering-bar"></div>
        </div>
        <div class="steering-label">📱 Telefonu eğerek yönlendirin</div>
      </div>

      <div class="racing-pedals" style="pointer-events:auto;">
        <button class="pedal-btn handbrake" id="racing-hb"
                style="touch-action:none;user-select:none;-webkit-user-select:none;">
          <span class="pedal-icon">🅿️</span>
          <span class="pedal-label">El Freni</span>
          <span class="pedal-mapping" id="hb-mapping-label"></span>
        </button>
        <button class="pedal-btn gas" id="racing-gas"
                style="touch-action:none;user-select:none;-webkit-user-select:none;">
          <span class="pedal-icon">⚡</span>
          <span class="pedal-label">GAZ</span>
          <span class="pedal-mapping" id="gas-mapping-label"></span>
        </button>
        <button class="pedal-btn brake" id="racing-brake"
                style="touch-action:none;user-select:none;-webkit-user-select:none;">
          <span class="pedal-icon">🛑</span>
          <span class="pedal-label">FREN</span>
          <span class="pedal-mapping" id="brake-mapping-label"></span>
        </button>
      </div>

      <!-- Pedal settings gear button -->
      <button id="pedal-settings-btn" title="Pedal tuş ayarları"
              style="pointer-events:auto;position:absolute;top:.5rem;right:.5rem;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:8px;padding:.3rem .55rem;font-size:1rem;cursor:pointer;z-index:10;touch-action:none;">⚙️</button>
    </div>
  </div>

  <!-- Pedal mapping modal -->
  <div id="pedal-modal" style="display:none;position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);align-items:flex-end;justify-content:center;">
    <div style="width:100%;max-width:480px;background:#13131f;border:1px solid rgba(255,255,255,.12);border-radius:18px 18px 0 0;padding:1.5rem 1.25rem 2rem;">
      <div style="font-size:1rem;font-weight:800;text-align:center;margin-bottom:1.25rem;color:#fff;">🏎️ Pedal Tuş Ayarları</div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid rgba(255,255,255,.07);">
        <label style="font-size:.85rem;font-weight:700;color:rgba(255,255,255,.75)">⚡ GAZ</label>
        <select id="sel-gas" style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:8px;padding:.4rem .75rem;font-size:.85rem;font-weight:700;"></select>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid rgba(255,255,255,.07);">
        <label style="font-size:.85rem;font-weight:700;color:rgba(255,255,255,.75)">🛑 FREN</label>
        <select id="sel-brake" style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:8px;padding:.4rem .75rem;font-size:.85rem;font-weight:700;"></select>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid rgba(255,255,255,.07);">
        <label style="font-size:.85rem;font-weight:700;color:rgba(255,255,255,.75)">🅿️ EL FRENİ</label>
        <select id="sel-hb" style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:8px;padding:.4rem .75rem;font-size:.85rem;font-weight:700;"></select>
      </div>
      <button id="pedal-sheet-ok" style="width:100%;margin-top:1rem;padding:.75rem;background:rgba(124,109,245,.5);border:none;border-radius:10px;color:#fff;font-size:1rem;font-weight:800;cursor:pointer;">Tamam</button>
    </div>
  </div>


  <!-- ── Scripts ─────────────────────────────────────────────────────────── -->
  <script src="js/vibration.js"></script>
  <script src="js/sensors.js"></script>
  <script src="js/controls.js"></script>
  <script src="js/connection.js"></script>

  <script>
  (() => {
    'use strict';

    // ── URL params ─────────────────────────────────────────────────────────
    const params  = new URLSearchParams(window.location.search);
    const name    = params.get('name')   || 'Oyuncu';
    const device  = params.get('device') || 'Bilinmeyen';
    let   layout  = params.get('layout') || 'xbox';

    // ── DOM refs ────────────────────────────────────────────────────────────
    const statusDot  = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const latencyEl  = document.getElementById('latency');
    const playerBadge= document.getElementById('player-badge');
    const steeringBar= document.getElementById('steering-bar');

    // ── Controls wiring ─────────────────────────────────────────────────────
    const { Joystick, Button, DPad, Trigger, getState, setAxis, setButton, setTrigger } = window.VGC.Controls;

    const leftStick  = new Joystick(
      document.getElementById('left-stick'),
      document.getElementById('left-thumb'), 'L', 'LS'
    );
    const rightStick = new Joystick(
      document.getElementById('right-stick'),
      document.getElementById('right-thumb'), 'R', 'RS'
    );

    new DPad({
      up:    document.getElementById('dpad-up'),
      down:  document.getElementById('dpad-down'),
      left:  document.getElementById('dpad-left'),
      right: document.getElementById('dpad-right')
    });

    new Trigger(document.getElementById('lt-zone'), document.getElementById('lt-fill'), 'LT');
    new Trigger(document.getElementById('rt-zone'), document.getElementById('rt-fill'), 'RT');

    [ ['btn-a','A'], ['btn-b','B'], ['btn-x','X'], ['btn-y','Y'],
      ['lb-btn','LB'], ['rb-btn','RB'],
      ['view-btn','SELECT'], ['menu-btn','START'], ['guide-btn','GUIDE']
    ].forEach(([id, key]) => new Button(document.getElementById(id), key));


    // ── Racing pedal mapping ─────────────────────────────────────────────────
    const PEDAL_OPTIONS = [
      { value: 'RT',  label: 'RT — Sağ Tetik' },
      { value: 'LT',  label: 'LT — Sol Tetik' },
      { value: 'A',   label: 'A' },
      { value: 'B',   label: 'B' },
      { value: 'X',   label: 'X' },
      { value: 'Y',   label: 'Y' },
      { value: 'RB',  label: 'RB' },
      { value: 'LB',  label: 'LB' },
      { value: 'START',  label: 'Start' },
      { value: 'SELECT', label: 'Select' },
    ];
    const TRIGGER_KEYS = new Set(['RT', 'LT']);
    const PEDAL_MAP_KEY = 'vgc-pedal-map';
    const DEFAULT_MAP   = { gas: 'RT', brake: 'LT', handbrake: 'A' };

    function loadPedalMap() {
      try { return { ...DEFAULT_MAP, ...JSON.parse(localStorage.getItem(PEDAL_MAP_KEY)) }; }
      catch { return { ...DEFAULT_MAP }; }
    }
    function savePedalMap(m) { localStorage.setItem(PEDAL_MAP_KEY, JSON.stringify(m)); }
    let pedalMap = loadPedalMap();

    function pressInput(key) {
      if (TRIGGER_KEYS.has(key)) setTrigger(key, 1);
      else setButton(key, true);
    }
    function releaseInput(key) {
      if (TRIGGER_KEYS.has(key)) setTrigger(key, 0);
      else setButton(key, false);
    }

    const pedalListeners = new Map();
    function bindPedal(id, getKey) {
      const el = document.getElementById(id);
      if (!el) return;

      // Remove previous listeners
      const prev = pedalListeners.get(id);
      if (prev) {
        el.removeEventListener('pointerdown',   prev.down);
        el.removeEventListener('pointerup',     prev.up);
        el.removeEventListener('pointercancel', prev.up);
      }

      const down = e => {
        e.preventDefault();
        try { el.setPointerCapture(e.pointerId); } catch(_) {}
        el.classList.add('pressed');
        const key = getKey();
        if (TRIGGER_KEYS.has(key)) setTrigger(key, 1);
        else setButton(key, true);
      };
      const up = e => {
        el.classList.remove('pressed');
        const key = getKey();
        if (TRIGGER_KEYS.has(key)) setTrigger(key, 0);
        else setButton(key, false);
      };

      pedalListeners.set(id, { down, up });
      el.addEventListener('pointerdown',   down);
      el.addEventListener('pointerup',     up);
      el.addEventListener('pointercancel', up);
    }

    function applyPedalMap() {
      bindPedal('racing-gas',   () => pedalMap.gas);
      bindPedal('racing-brake', () => pedalMap.brake);
      bindPedal('racing-hb',    () => pedalMap.handbrake);
      const gl = document.getElementById('gas-mapping-label');
      const bl = document.getElementById('brake-mapping-label');
      const hl = document.getElementById('hb-mapping-label');
      if (gl) gl.textContent = pedalMap.gas;
      if (bl) bl.textContent = pedalMap.brake;
      if (hl) hl.textContent = pedalMap.handbrake;
    }
    applyPedalMap();

    // ── Pedal settings modal ───────────────────────────────────────────────
    const selGas   = document.getElementById('sel-gas');
    const selBrake = document.getElementById('sel-brake');
    const selHb    = document.getElementById('sel-hb');
    if (selGas && selBrake && selHb) {
      [selGas, selBrake, selHb].forEach(sel => {
        PEDAL_OPTIONS.forEach(opt => {
          const o = document.createElement('option');
          o.value = opt.value; o.textContent = opt.label;
          sel.appendChild(o);
        });
      });
      selGas.value   = pedalMap.gas;
      selBrake.value = pedalMap.brake;
      selHb.value    = pedalMap.handbrake;

      const pedalModal = document.getElementById('pedal-modal');
      const settingsBtn = document.getElementById('pedal-settings-btn');
      if (settingsBtn) settingsBtn.addEventListener('click', () => { pedalModal.style.display = 'flex'; });
      document.getElementById('pedal-sheet-ok').addEventListener('click', () => {
        pedalMap = { gas: selGas.value, brake: selBrake.value, handbrake: selHb.value };
        savePedalMap(pedalMap);
        applyPedalMap();
        pedalModal.style.display = 'none';
      });
      pedalModal.addEventListener('click', e => { if (e.target === pedalModal) pedalModal.style.display = 'none'; });
    }


    // ── Gyroscope (racing steering) ─────────────────────────────────────────
    const { Sensors } = window.VGC;
    let gyroEnabled  = false;
    let gyroSmoothed = 0;          // low-pass filter state

    async function enableGyro() {
      const result = await Sensors.requestPermission();
      if (result === 'granted') {
        Sensors.start(({ beta }) => {
          if (layout !== 'racing') return;

          // In landscape mode, left/right tilt = beta axis (not gamma)
          // 30° = full lock — more natural steering wheel feel
          const raw = Sensors.tiltToAxis(beta, 30);

          // Dead zone ±4° → prevents drift when held still
          const DEAD = 0.07;
          const dzed = Math.abs(raw) < DEAD ? 0 : (raw - Math.sign(raw) * DEAD) / (1 - DEAD);

          // Exponential low-pass filter — smooths out jitter
          // alpha=0.12: responsive but no sharp jumps (lower = smoother, more lag)
          gyroSmoothed = 0.12 * dzed + 0.88 * gyroSmoothed;

          setAxis('LX', gyroSmoothed);

          if (steeringBar) {
            steeringBar.style.left = `${50 + gyroSmoothed * 48}%`;
          }
        });
        gyroEnabled = true;
      }
    }


    // ── Layout switching ────────────────────────────────────────────────
    function applyLayout(l) {
      layout = l;
      document.querySelectorAll('.layout-tab').forEach(t =>
        t.classList.toggle('active', t.dataset.layout === l)
      );

      const racingOverlay = document.getElementById('racing-overlay');
      if (racingOverlay) racingOverlay.style.display = (l === 'racing') ? '' : 'none';

      // In racing mode: hide only left joystick (gyro steers instead)
      // All other buttons remain fully visible and interactive
      const leftStick = document.getElementById('left-stick');
      if (leftStick) leftStick.style.visibility = (l === 'racing') ? 'hidden' : '';

      if (l === 'racing' && !gyroEnabled) enableGyro();
    }

    document.querySelectorAll('.layout-tab').forEach(tab => {
      tab.addEventListener('click', () => applyLayout(tab.dataset.layout));
    });

    applyLayout(layout);

    // ── Wake Lock (ekranın kararmasını engelle) ───────────────────────────────
    let wakeLock = null;

    async function requestWakeLock() {
      if (!('wakeLock' in navigator)) return;
      try {
        wakeLock = await navigator.wakeLock.request('screen');
        console.log('[VGC] Wake Lock aktif — ekran kapanmaz');
        wakeLock.addEventListener('release', () => {
          console.log('[VGC] Wake Lock serbest bırakıldı');
          wakeLock = null;
        });
      } catch (e) {
        console.warn('[VGC] Wake Lock başarısız:', e.message);
      }
    }

    // Sayfa görünür olduğunda Wake Lock'u yeniden al (sekme değiştirilince otomatik serbest bırakılıyor)
    document.addEventListener('visibilitychange', async () => {
      if (document.visibilityState === 'visible' && wakeLock === null) {
        await requestWakeLock();
      }
    });

    // ── Orientation Lock (landscape modunu kilitle) ───────────────────────────
    async function lockLandscape() {
      try {
        if (screen.orientation && screen.orientation.lock) {
          await screen.orientation.lock('landscape');
          console.log('[VGC] Orientation landscape\'e kilitlendi');
        }
      } catch (e) {
        // iOS fullscreen gerektirdiğinden sessizce geç
        console.warn('[VGC] Orientation lock başarısız:', e.message);
      }
    }

    // ── Connection ──────────────────────────────────────────────────────────
    const { Connection } = window.VGC;

    Connection.onConnected(async pid => {
      statusDot.className  = 'dot green';
      statusText.textContent = `${name} — Bağlı`;
      playerBadge.style.display = '';
      playerBadge.textContent   = `P${pid}`;
      window.VGC.Vibration.pulse(60);
      // Bağlantı kurulunca (kullanıcı etkileşimi sonrası) kilitleri etkinleştir
      await requestWakeLock();
      await lockLandscape();
    });

    Connection.onDisconnected(() => {
      statusDot.className  = 'dot red';
      statusText.textContent = 'Bağlantı kesildi — yeniden deneniyor…';
      playerBadge.style.display = 'none';
    });

    Connection.onLatency(ms => {
      latencyEl.textContent = `${ms}ms`;
    });

    Connection.onError(msg => {
      statusDot.className    = 'dot red';
      statusText.textContent = msg;
    });

    Connection.onVibration((large, small) => {
      window.VGC.Vibration.vibrate(large, small);
    });

    Connection.connect({ name, device });

    // ── Input loop (60 fps) ─────────────────────────────────────────────────
    let lastSendTime   = 0;
    let pingTime       = 0;
    const SEND_INTERVAL = 1000 / 60;   // ~16ms

    function gameLoop(ts) {
      if (ts - lastSendTime >= SEND_INTERVAL) {
        lastSendTime = ts;
        Connection.sendInput(getState());

        // Simple latency display via ping-pong (approximation)
        if (ts - pingTime > 1000) {
          pingTime = ts;
          // latency display is handled by ws round-trip approximation
        }
      }
      requestAnimationFrame(gameLoop);
    }
    requestAnimationFrame(gameLoop);

    // ── Fullscreen + Orientation Lock ────────────────────────────────────────
    const fsBtn = document.getElementById('fullscreen-btn');

    async function enterFullscreen() {
      try {
        if (document.documentElement.requestFullscreen) {
          await document.documentElement.requestFullscreen({ navigationUI: 'hide' });
        } else if (document.documentElement.webkitRequestFullscreen) {
          await document.documentElement.webkitRequestFullscreen();
        }
      } catch (_) { /* iOS doesn't support fullscreen API */ }

      // Lock to landscape (works on Android Chrome; silently fails on iOS)
      try {
        if (screen.orientation && screen.orientation.lock) {
          await screen.orientation.lock('landscape');
        } else if (screen.lockOrientation) {
          screen.lockOrientation('landscape');
        }
      } catch (_) {}
    }

    async function exitFullscreen() {
      try {
        if (document.exitFullscreen) await document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
      } catch (_) {}
      try {
        if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
      } catch (_) {}
    }

    function updateFsIcon() {
      const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
      fsBtn.textContent = isFs ? '✕' : '⛶';
      fsBtn.title = isFs ? 'Tam Ekrandan Çık' : 'Tam Ekran';
    }

    fsBtn.addEventListener('click', async () => {
      const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
      if (isFs) await exitFullscreen();
      else       await enterFullscreen();
    });

    document.addEventListener('fullscreenchange',       updateFsIcon);
    document.addEventListener('webkitfullscreenchange', updateFsIcon);

    // Auto-enter fullscreen + landscape on first touch anywhere
    let autoFsDone = false;
    document.addEventListener('touchstart', async () => {
      if (autoFsDone) return;
      autoFsDone = true;
      await enterFullscreen();
    }, { once: true, passive: true });

  })();
  </script>
</body>
</html>
